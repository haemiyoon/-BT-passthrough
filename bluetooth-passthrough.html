<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>SoundBridge</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080a0f;
      --surface: #0e1118;
      --border: #1e2535;
      --accent: #00e5ff;
      --accent2: #ff3cac;
      --text: #e8eaf2;
      --muted: #4a5270;
      --green: #00ff88;
      --orange: #ffaa00;
      --glow: 0 0 30px rgba(0,229,255,0.25);
      --glow-orange: 0 0 30px rgba(255,170,0,0.25);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .glow-orb {
      position: fixed; border-radius: 50%;
      filter: blur(80px); pointer-events: none; z-index: 0;
    }
    .glow-orb.a { width:300px;height:300px;background:rgba(0,229,255,0.07);top:-80px;left:-60px; }
    .glow-orb.b { width:250px;height:250px;background:rgba(255,60,172,0.07);bottom:-60px;right:-40px; }

    .app {
      position: relative; z-index: 1;
      width: min(420px, 96vw);
      display: flex; flex-direction: column; align-items: center; gap: 20px;
    }

    header { text-align: center; }

    .logo {
      font-family: 'Syne', sans-serif; font-size: 2.2rem; font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .tagline {
      font-size: 0.7rem; color: var(--muted);
      letter-spacing: 0.18em; text-transform: uppercase; margin-top: 4px;
    }

    /* ── Orb ── */
    .orb-wrap { position: relative; width: 190px; height: 190px; }

    .orb-ring {
      position: absolute; inset: -12px; border-radius: 50%;
      border: 1px solid rgba(0,229,255,0.15);
      animation: spin 8s linear infinite; transition: border-color 0.4s;
    }
    .orb-ring::after {
      content: ''; position: absolute; width: 10px; height: 10px;
      border-radius: 50%; background: var(--accent);
      top: 8px; left: 50%; transform: translateX(-50%);
      box-shadow: 0 0 12px var(--accent); transition: all 0.4s;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .orb-btn {
      position: absolute; inset: 0; border-radius: 50%;
      background: var(--surface); border: 1.5px solid var(--border);
      cursor: pointer; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 8px;
      transition: all 0.3s ease;
      -webkit-tap-highlight-color: transparent; user-select: none;
    }
    .orb-btn:active { transform: scale(0.96); }

    .orb-btn.live {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent), var(--glow), inset 0 0 40px rgba(0,229,255,0.08);
    }
    .orb-btn.live .orb-ring { border-color: rgba(0,229,255,0.4); }
    .orb-btn.live .mic-stroke { stroke: var(--accent); }
    .orb-btn.live .orb-label { color: var(--accent); }

    .orb-btn.muted {
      border-color: var(--orange);
      box-shadow: 0 0 0 1px var(--orange), var(--glow-orange), inset 0 0 40px rgba(255,170,0,0.06);
    }
    .orb-btn.muted .mic-stroke { stroke: var(--orange); }
    .orb-btn.muted .slash-line { opacity: 1; }
    .orb-btn.muted .orb-label { color: var(--orange); }

    .mic-icon { width: 46px; height: 46px; transition: all 0.3s; }
    .mic-stroke { stroke: #4a5270; transition: stroke 0.3s; }
    .slash-line { opacity: 0; transition: opacity 0.25s; }

    .orb-label {
      font-family: 'Syne', sans-serif; font-size: 0.72rem; font-weight: 700;
      letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--muted); transition: color 0.3s;
    }

    .pulse-ring {
      position: absolute; inset: -20px; border-radius: 50%;
      border: 1.5px solid rgba(0,229,255,0.2); pointer-events: none;
    }
    .orb-btn.live ~ .pulse-ring { animation: pulse-expand 2s ease-out infinite; }
    @keyframes pulse-expand {
      0% { transform: scale(1); opacity: 0.5; }
      100% { transform: scale(1.25); opacity: 0; }
    }

    /* ── Mute toggle button ── */
    .mute-btn {
      width: 100%; padding: 15px 20px; border-radius: 14px;
      border: 1.5px solid var(--border); background: var(--surface);
      color: var(--muted); font-family: 'Syne', sans-serif;
      font-size: 0.78rem; font-weight: 700; letter-spacing: 0.13em;
      text-transform: uppercase; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      transition: all 0.25s ease;
      -webkit-tap-highlight-color: transparent; user-select: none;
      opacity: 0.3; pointer-events: none;
    }
    .mute-btn.enabled { opacity: 1; pointer-events: all; }
    .mute-btn.enabled:active { transform: scale(0.98); }

    .mute-btn.is-live {
      border-color: rgba(0,229,255,0.35); color: var(--accent);
    }
    .mute-btn.is-muted {
      border-color: var(--orange); color: var(--orange);
      background: rgba(255,170,0,0.05); box-shadow: var(--glow-orange);
    }
    .mute-icon { width: 17px; height: 17px; flex-shrink: 0; }

    /* ── Waveform ── */
    .visualizer-wrap {
      width: 100%; height: 62px; background: var(--surface);
      border: 1px solid var(--border); border-radius: 12px;
      overflow: hidden; position: relative;
    }
    canvas#waveform { width: 100%; height: 100%; display: block; }
    .visualizer-label {
      position: absolute; top: 7px; left: 12px;
      font-size: 0.58rem; color: var(--muted);
      letter-spacing: 0.1em; text-transform: uppercase;
    }

    /* ── Sliders ── */
    .controls {
      width: 100%; background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 18px 20px;
      display: flex; flex-direction: column; gap: 16px;
    }
    .control-row { display: flex; align-items: center; gap: 12px; }
    .control-icon { width: 16px; height: 16px; flex-shrink: 0; color: var(--muted); }
    .control-label {
      font-size: 0.62rem; text-transform: uppercase;
      letter-spacing: 0.12em; color: var(--muted); width: 48px; flex-shrink: 0;
    }
    input[type="range"] {
      -webkit-appearance: none; flex: 1; height: 3px;
      background: var(--border); border-radius: 2px; outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%;
      background: var(--accent); box-shadow: 0 0 8px rgba(0,229,255,0.5);
      cursor: pointer; border: 2px solid var(--bg);
    }
    .control-value { font-size: 0.68rem; color: var(--accent); width: 38px; text-align: right; }

    /* ── Status ── */
    .status-bar {
      width: 100%; display: flex; align-items: center; justify-content: space-between;
      padding: 9px 14px; background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; font-size: 0.62rem; color: var(--muted); letter-spacing: 0.08em;
    }
    .status-dot {
      width: 7px; height: 7px; border-radius: 50%; background: var(--muted);
      display: inline-block; margin-right: 6px; transition: all 0.3s;
    }
    .status-dot.live {
      background: var(--green); box-shadow: 0 0 6px var(--green);
      animation: blink 1.5s ease-in-out infinite;
    }
    .status-dot.muted { background: var(--orange); box-shadow: 0 0 6px var(--orange); }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }

    .tip {
      font-size: 0.58rem; color: var(--muted);
      text-align: center; line-height: 1.7; padding: 0 8px;
    }
  </style>
</head>
<body>
  <div class="glow-orb a"></div>
  <div class="glow-orb b"></div>

  <div class="app">
    <header>
      <div class="logo">SoundBridge</div>
      <div class="tagline">BT Mic → Speaker Passthrough</div>
    </header>

    <!-- Power orb -->
    <div class="orb-wrap">
      <div class="orb-ring"></div>
      <div class="orb-btn" id="mainBtn" onclick="togglePassthrough()">
        <svg class="mic-icon" viewBox="0 0 48 48" fill="none">
          <rect class="mic-stroke" x="18" y="4" width="12" height="22" rx="6" stroke-width="2.5"/>
          <path class="mic-stroke" d="M10 24c0 7.732 6.268 14 14 14s14-6.268 14-14" stroke-width="2.5" stroke-linecap="round"/>
          <line class="mic-stroke" x1="24" y1="38" x2="24" y2="44" stroke-width="2.5" stroke-linecap="round"/>
          <line class="mic-stroke" x1="16" y1="44" x2="32" y2="44" stroke-width="2.5" stroke-linecap="round"/>
          <line class="slash-line" x1="8" y1="40" x2="40" y2="8" stroke="#ffaa00" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
        <span class="orb-label" id="btnLabel">TAP TO START</span>
      </div>
      <div class="pulse-ring"></div>
    </div>

    <!-- Mute / Unmute toggle -->
    <button class="mute-btn" id="muteBtn" onclick="toggleMute()">
      <!-- mic-off icon when live, mic icon when muted -->
      <svg class="mute-icon" id="muteIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <!-- default: mic-off (shown when live — click to mute) -->
        <line x1="1" y1="1" x2="23" y2="23"/>
        <path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V4a3 3 0 0 0-5.94-.6"/>
        <path d="M17 16.95A7 7 0 0 1 5 12v-2m14 0v2a7 7 0 0 1-.11 1.23"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
      <span id="muteBtnLabel">MUTE</span>
    </button>

    <!-- Waveform -->
    <div class="visualizer-wrap">
      <span class="visualizer-label">Waveform</span>
      <canvas id="waveform"></canvas>
    </div>

    <!-- Controls -->
    <div class="controls">
      <div class="control-row">
        <svg class="control-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
        </svg>
        <span class="control-label">Volume</span>
        <input type="range" id="volumeSlider" min="0" max="200" value="100" oninput="updateVolume(this)">
        <span class="control-value" id="volumeVal">100%</span>
      </div>
      <div class="control-row">
        <svg class="control-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="12" x2="15" y2="15"/>
        </svg>
        <span class="control-label">Gain</span>
        <input type="range" id="gainSlider" min="0" max="400" value="100" oninput="updateGain(this)">
        <span class="control-value" id="gainVal">1.0x</span>
      </div>
    </div>

    <!-- Status -->
    <div class="status-bar">
      <div>
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">STANDBY</span>
      </div>
      <div id="deviceInfo">—</div>
    </div>

    <p class="tip">
      Connect BT headset &amp; JBL Go 4 before starting.<br>
      <strong style="color:var(--accent)">Mute toggle</strong> silences the speaker instantly — mic stays connected.<br>
      <strong style="color:var(--accent2)">⚠ Keep mic &amp; speaker on separate devices to avoid feedback.</strong>
    </p>
  </div>

  <script>
    let audioCtx       = null;
    let sourceNode     = null;
    let inputGainNode  = null;
    let outputGainNode = null;
    let analyserNode   = null;
    let streamRef      = null;
    let animFrameId    = null;

    let isActive      = false;
    let isMuted       = false;
    let outputGainVal = 1.0;
    let inputGainVal  = 1.0;

    const mainBtn    = document.getElementById('mainBtn');
    const btnLabel   = document.getElementById('btnLabel');
    const muteBtn    = document.getElementById('muteBtn');
    const muteBtnLbl = document.getElementById('muteBtnLabel');
    const statusDot  = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const deviceInfo = document.getElementById('deviceInfo');
    const canvas     = document.getElementById('waveform');
    const ctx2d      = canvas.getContext('2d');

    function resizeCanvas() {
      canvas.width  = canvas.offsetWidth  * window.devicePixelRatio;
      canvas.height = canvas.offsetHeight * window.devicePixelRatio;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);
    clearCanvas();

    // ── Power ──────────────────────────────────────────────
    async function togglePassthrough() {
      isActive ? stopPassthrough() : await startPassthrough();
    }

    async function startPassthrough() {
      setStatus('REQUESTING MIC…', '');
      try {
        // Try with minimal constraints first — Samsung Android rejects
        // specific sampleRate or advanced constraints even with permission granted.
        // We progressively fall back to broader constraints if needed.
        let stream = null;
        const attempts = [
          // Attempt 1: minimal — most compatible with Android BT headsets
          { audio: true },
          // Attempt 2: disable processing but no sampleRate
          { audio: { echoCancellation:false, noiseSuppression:false, autoGainControl:false } },
          // Attempt 3: just echoCancellation off
          { audio: { echoCancellation:false } },
        ];

        let lastErr = null;
        for (const constraints of attempts) {
          try {
            stream = await navigator.mediaDevices.getUserMedia(constraints);
            break; // success
          } catch (e) {
            lastErr = e;
            // Only retry on OverconstrainedError or NotReadableError
            if (e.name === 'NotAllowedError') throw e; // permission denied — no point retrying
          }
        }

        if (!stream) throw lastErr;
        streamRef = stream;

        // Let browser pick its native sample rate — don't force 48000
        audioCtx = new (window.AudioContext || window.webkitAudioContext)({ latencyHint:'interactive' });
        if (audioCtx.state === 'suspended') await audioCtx.resume();

        sourceNode     = audioCtx.createMediaStreamSource(stream);
        inputGainNode  = audioCtx.createGain();
        outputGainNode = audioCtx.createGain();
        analyserNode   = audioCtx.createAnalyser();
        analyserNode.fftSize = 1024;

        inputGainNode.gain.value  = inputGainVal;
        outputGainNode.gain.value = outputGainVal;

        sourceNode.connect(inputGainNode);
        inputGainNode.connect(analyserNode);
        analyserNode.connect(outputGainNode);
        outputGainNode.connect(audioCtx.destination);

        isActive = true;
        isMuted  = false;

        const tracks = stream.getAudioTracks();
        if (tracks.length) {
          const lbl = tracks[0].label || 'Microphone';
          deviceInfo.textContent = lbl.length > 22 ? lbl.slice(0,22)+'…' : lbl;
        }

        applyUI();
        drawWaveform();
      } catch (err) {
        console.error('Mic error:', err.name, err.message);
        let msg = 'ERROR: ' + err.name;
        if (err.name === 'NotAllowedError') msg = 'MIC DENIED — CHECK PERMISSIONS';
        else if (err.name === 'NotFoundError') msg = 'NO MIC FOUND';
        else if (err.name === 'NotReadableError') msg = 'MIC IN USE BY ANOTHER APP';
        else if (err.name === 'OverconstrainedError') msg = 'MIC CONSTRAINT ERROR';
        setStatus(msg, '');
        btnLabel.textContent = 'TAP TO RETRY';
      }
    }

    function stopPassthrough() {
      streamRef?.getTracks().forEach(t => t.stop()); streamRef = null;
      audioCtx?.close(); audioCtx = null;
      if (animFrameId) { cancelAnimationFrame(animFrameId); animFrameId = null; }
      isActive = false; isMuted = false;
      deviceInfo.textContent = '—';
      applyUI();
      clearCanvas();
    }

    // ── Mute ──────────────────────────────────────────────
    function toggleMute() {
      if (!isActive) return;
      isMuted = !isMuted;
      if (outputGainNode) {
        const t = audioCtx.currentTime;
        outputGainNode.gain.cancelScheduledValues(t);
        outputGainNode.gain.setValueAtTime(outputGainNode.gain.value, t);
        outputGainNode.gain.linearRampToValueAtTime(isMuted ? 0 : outputGainVal, t + 0.02);
      }
      applyUI();
    }

    // ── UI state ───────────────────────────────────────────
    function applyUI() {
      mainBtn.classList.remove('live','muted');
      muteBtn.classList.remove('enabled','is-live','is-muted');

      if (!isActive) {
        btnLabel.textContent = 'TAP TO START';
        setStatus('STANDBY', '');
        return;
      }

      if (isMuted) {
        mainBtn.classList.add('muted');
        muteBtn.classList.add('enabled','is-muted');
        btnLabel.textContent    = 'MUTED';
        muteBtnLbl.textContent  = '▶ UNMUTE';
        setStatus('MUTED — SPEAKER SILENT', 'muted');
      } else {
        mainBtn.classList.add('live');
        muteBtn.classList.add('enabled','is-live');
        btnLabel.textContent    = 'LIVE';
        muteBtnLbl.textContent  = '⏸ MUTE';
        setStatus('LIVE', 'live');
      }
    }

    function setStatus(text, cls) {
      statusText.textContent = text;
      statusDot.className    = 'status-dot' + (cls ? ' '+cls : '');
    }

    // ── Sliders ────────────────────────────────────────────
    function updateVolume(el) {
      outputGainVal = el.value / 100;
      document.getElementById('volumeVal').textContent = el.value + '%';
      if (outputGainNode && !isMuted)
        outputGainNode.gain.setTargetAtTime(outputGainVal, audioCtx.currentTime, 0.01);
    }

    function updateGain(el) {
      inputGainVal = el.value / 100;
      document.getElementById('gainVal').textContent = inputGainVal.toFixed(1) + 'x';
      if (inputGainNode)
        inputGainNode.gain.setTargetAtTime(inputGainVal, audioCtx.currentTime, 0.01);
    }

    // ── Waveform ───────────────────────────────────────────
    function drawWaveform() {
      if (!analyserNode) return;
      animFrameId = requestAnimationFrame(drawWaveform);

      const buf = new Float32Array(analyserNode.fftSize);
      analyserNode.getFloatTimeDomainData(buf);

      const w = canvas.width, h = canvas.height;
      ctx2d.clearRect(0,0,w,h);
      ctx2d.fillStyle = '#0e1118';
      ctx2d.fillRect(0,0,w,h);

      const grad = ctx2d.createLinearGradient(0,0,w,0);
      if (isMuted) {
        grad.addColorStop(0,'rgba(255,170,0,0.3)');
        grad.addColorStop(0.5,'rgba(255,170,0,0.9)');
        grad.addColorStop(1,'rgba(255,170,0,0.3)');
        ctx2d.shadowColor = '#ffaa00';
      } else {
        grad.addColorStop(0,'rgba(0,229,255,0.3)');
        grad.addColorStop(0.5,'rgba(0,229,255,1)');
        grad.addColorStop(1,'rgba(255,60,172,0.6)');
        ctx2d.shadowColor = '#00e5ff';
      }

      ctx2d.beginPath();
      ctx2d.strokeStyle = grad;
      ctx2d.lineWidth   = 2 * window.devicePixelRatio;
      ctx2d.shadowBlur  = 8;

      const sw = w / buf.length;
      let x = 0;
      for (let i = 0; i < buf.length; i++) {
        const y = (0.5 + buf[i] * 0.5) * h;
        i === 0 ? ctx2d.moveTo(x,y) : ctx2d.lineTo(x,y);
        x += sw;
      }
      ctx2d.stroke();
    }

    function clearCanvas() {
      const w = canvas.width, h = canvas.height;
      ctx2d.clearRect(0,0,w,h);
      ctx2d.fillStyle = '#0e1118';
      ctx2d.fillRect(0,0,w,h);
      ctx2d.beginPath();
      ctx2d.strokeStyle = 'rgba(0,229,255,0.15)';
      ctx2d.lineWidth   = 1.5 * window.devicePixelRatio;
      ctx2d.moveTo(0, h/2); ctx2d.lineTo(w, h/2);
      ctx2d.stroke();
    }
  </script>
</body>
</html>
