<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yoga Live Mixer</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #0f172a; color: white; padding: 20px; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        .controls { background: #1e293b; padding: 20px; border-radius: 15px; margin-bottom: 15px; }
        .playlist { flex-grow: 1; overflow-y: auto; background: #1e293b; border-radius: 15px; padding: 10px; }
        .song-item { padding: 15px; margin-bottom: 8px; background: #334155; border-radius: 10px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .song-item.active { background: #0ea5e9; border: 2px solid #38bdf8; }
        button { background: #0ea5e9; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; width: 100%; margin-bottom: 10px; }
        .vol-row { display: flex; flex-direction: column; gap: 5px; margin-top: 10px; }
        input[type="range"] { width: 100%; }
        #micStatus { font-size: 0.8rem; text-align: center; color: #94a3b8; }
    </style>
</head>
<body>

    <div class="controls">
        <button id="micBtn">1. ENABLE MIC & SYSTEM</button>
        <div id="micStatus">Mic Status: Off</div>
        
        <div class="vol-row">
            <label>Music Volume</label>
            <input type="range" id="volSlider" min="0" max="1" step="0.05" value="0.4">
        </div>
        
        <label style="display:block; margin-top:15px; font-size: 0.9rem;">2. LOAD CLASS PLAYLIST</label>
        <input type="file" id="filePicker" multiple accept="audio/*" style="font-size: 0.8rem;">
    </div>

    <div class="playlist" id="playlistUI">
        <p style="text-align:center; color: #64748b;">No songs loaded yet.</p>
    </div>

    <script>
        let audioCtx, micSource, currentMusicSource, musicGain;
        const playlistUI = document.getElementById('playlistUI');
        const filePicker = document.getElementById('filePicker');
        const volSlider = document.getElementById('volSlider');
        const micBtn = document.getElementById('micBtn');
        let songData = [];

        // 1. Initialize Audio and Microphone
        micBtn.onclick = async () => {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                musicGain = audioCtx.createGain();
                musicGain.gain.value = volSlider.value;
                musicGain.connect(audioCtx.destination);

                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: false } });
                    micSource = audioCtx.createMediaStreamSource(stream);
                    micSource.connect(audioCtx.destination);
                    micBtn.innerText = "SYSTEM ACTIVE";
                    micBtn.style.background = "#22c55e";
                    document.getElementById('micStatus').innerText = "Mic is LIVE to Speakers";
                } catch (e) {
                    alert("Microphone access denied.");
                }
            }
        };

        // 2. Handle File Loading
        filePicker.onchange = (e) => {
            songData = Array.from(e.target.files);
            renderPlaylist();
        };

        function renderPlaylist() {
            playlistUI.innerHTML = "";
            songData.forEach((file, index) => {
                const div = document.createElement('div');
                div.className = 'song-item';
                div.innerHTML = `<span>${file.name.replace('.m4a', '')}</span>`;
                div.onclick = () => playSong(index);
                playlistUI.appendChild(div);
            });
        }

        // 3. Play selected song
        async function playSong(index) {
            if (!audioCtx) return alert("Please tap 'Enable Mic' first!");
            
            if (currentMusicSource) currentMusicSource.stop();
            
            const file = songData[index];
            const arrayBuffer = await file.arrayBuffer();
            const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
            
            currentMusicSource = audioCtx.createBufferSource();
            currentMusicSource.buffer = audioBuffer;
            currentMusicSource.connect(musicGain);
            currentMusicSource.start(0);

            // Update UI
            document.querySelectorAll('.song-item').forEach((el, i) => {
                el.classList.toggle('active', i === index);
            });
        }

        volSlider.oninput = () => { if (musicGain) musicGain.gain.value = volSlider.value; };
    </script>
</body>
</html>
