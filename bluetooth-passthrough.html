<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Mic Router</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #121212; color: white; }
        button { padding: 20px 40px; font-size: 1.2rem; cursor: pointer; border-radius: 50px; border: none; background: #007AFF; color: white; }
        .status { margin-top: 20px; color: #888; }
    </style>
</head>
<body>
    <h2>Live Mic-to-Speaker</h2>
    <p>Connect your Lightning Mic & BT Speaker first.</p>
    <button id="startBtn">START BROADCAST</button>
    <div id="status" class="status">Status: Standby</div>

    <script>
        const btn = document.getElementById('startBtn');
        const status = document.getElementById('status');
        let audioContext;

        btn.onclick = async () => {
            if (!audioContext) {
                try {
                    // 1. Initialize Audio Context
                    audioContext = new (window.AudioContext || window.webkitAudioContext)({
                        latencyHint: 'interactive' // Request lowest possible latency
                    });

                    // 2. Request Mic Access
                    const stream = await navigator.mediaDevices.getUserMedia({ 
                        audio: {
                            echoCancellation: false, // Turn off to reduce delay
                            noiseSuppression: false,
                            autoGainControl: false
                        } 
                    });

                    // 3. Route Input to Output
                    const source = audioContext.createMediaStreamSource(stream);
                    source.connect(audioContext.destination);

                    status.innerText = "Status: LIVE (Check BT Speaker)";
                    btn.innerText = "STOP";
                    btn.style.background = "#FF3B30";
                } catch (err) {
                    status.innerText = "Error: " + err.message;
                }
            } else {
                audioContext.close();
                audioContext = null;
                status.innerText = "Status: Stopped";
                btn.innerText = "START BROADCAST";
                btn.style.background = "#007AFF";
            }
        };
    </script>
</body>
</html>
